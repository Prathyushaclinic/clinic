<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doctor Appointment Booking</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #0F6E56;
    --bg: #f7f8f6;
    --surface: #ffffff;
    --border: #e0e0dc;
    --text: #1a1a18;
    --muted: #6b6b67;
    --danger: #A32D2D;
    --danger-bg: #FCEBEB;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: #3a3a36;
      --text: #f0f0ec;
      --muted: #9a9a96;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .page { max-width: 500px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .header-icon { width: 44px; height: 44px; background: var(--teal); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-icon svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .header-name { font-size: 18px; font-weight: 600; }
  .header-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 12px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus { border-color: var(--teal); }
  .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .slot { padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; background: var(--surface); }
  .slot:hover:not(.booked) { border-color: var(--teal); background: var(--teal-light); }
  .slot.selected { border-color: var(--teal); background: var(--teal-light); }
  .slot.booked { opacity: 0.4; cursor: not-allowed; }
  .slot-time { font-size: 14px; font-weight: 600; }
  .slot-date { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .slot-tag { font-size: 10px; color: var(--danger); font-weight: 500; margin-top: 3px; }
  .no-slots { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
  .btn { width: 100%; padding: 12px; background: var(--teal); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--teal-dark); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .btn-danger:hover { background: var(--danger-bg); }
  .success-box { background: var(--teal-light); border: 1px solid var(--teal); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; margin-top: 1rem; display: none; }
  .success-box.show { display: block; }
  .success-check { font-size: 36px; margin-bottom: 8px; }
  .success-title { font-size: 17px; font-weight: 600; color: var(--teal-dark); }
  .success-sub { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .admin-slot-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; background: var(--surface); }
  .admin-slot-booked { opacity: 0.55; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-booked { background: #faeeda; color: #854F0B; }
  .badge-avail { background: var(--teal-light); color: var(--teal-dark); }
  .pw-screen { display: flex; flex-direction: column; gap: 12px; padding: 2rem 0; }
  .pw-screen input { padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); outline: none; }
  .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
  .config-note { background: #faeeda; border: 1px solid #EF9F27; border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: #633806; margin-bottom: 1rem; line-height: 1.6; }
  .loading { text-align: center; color: var(--muted); font-size: 14px; padding: 1.5rem; }
  #view-admin { display: none; }
</style>
</head>
<body>

<!-- ===== CONFIG — FILL THESE IN ===== -->
<script>
const CONFIG = {
  DOCTOR_NAME:      "Dr. G Prathyusha",               // change this
  CLINIC_NAME:      "Dr. Prathyusha's Clinic",           // change this
  DOCTOR_EMAIL:     "prathyushasvmc@gmail.com",    // change this
  ADMIN_PASSWORD:   "clinic2026",               // change this — admin page password
  SHEET_WEBAPP_URL: "https://script.google.com/macros/s/AKfycbzS9AAlFdB3xM9g7ZZz5GgmqSaVJhC2jP6Ewn6UXvuYJPsgW7rrM9O5XVjv16wHJsRs/exec",
  EMAILJS_PUBLIC_KEY: "FVNwENHpkOwFa7KRu",
  EMAILJS_SERVICE_ID: "service_ecxq9hp",
  EMAILJS_TEMPLATE_DOCTOR: "template_16jfvyd",
  EMAILJS_TEMPLATE_PATIENT: "template_21jejrb",
};
</script>
<!-- ===================================== -->

<div class="page" id="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/><path d="M2 20v-1a7 7 0 0 1 7-7h6a7 7 0 0 1 7 7v1"/><line x1="12" y1="13" x2="12" y2="19"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
    </div>
    <div>
      <div class="header-name" id="hdr-name">Loading...</div>
      <div class="header-sub" id="hdr-sub"></div>
    </div>
  </div>

  <!-- BOOKING VIEW -->
  <div id="view-book">
    <div class="card">
      <p class="section-label">Your details</p>
      <div class="field"><label>Full name</label><input id="inp-name" type="text" placeholder="e.g. Rahul Sharma" /></div>
      <div class="field"><label>Mobile number</label><input id="inp-mobile" type="tel" placeholder="e.g. 9876543210" maxlength="10" /></div>
      <div class="field"><label>Email (for confirmation)</label><input id="inp-email" type="email" placeholder="optional" /></div>
    </div>

    <div class="card">
      <p class="section-label">Pick a slot</p>
      <div class="slots-grid" id="slots-grid">
        <div class="loading">Loading slots…</div>
      </div>
      <button class="btn" id="btn-book" onclick="submitBooking()">Confirm appointment</button>
    </div>

    <div class="success-box" id="success-box">
      <div class="success-check">✓</div>
      <div class="success-title">Appointment confirmed!</div>
      <div class="success-sub" id="success-msg">Your doctor will call you at the booked time.</div>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="view-admin">
    <div id="admin-pw-gate">
      <div class="card">
        <p class="section-label">Admin access</p>
        <div class="pw-screen">
          <input id="pw-inp" type="password" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')checkPw()" />
          <button class="btn" onclick="checkPw()">Enter</button>
        </div>
      </div>
    </div>
    <div id="admin-panel" style="display:none;">
      <div class="card">
        <p class="section-label">Add a new slot</p>
        <div class="field"><label>Date</label><input id="admin-date" type="date" /></div>
        <div class="field"><label>Time</label><input id="admin-time" type="time" /></div>
        <button class="btn" onclick="addSlot()">Add slot</button>
      </div>
      <div class="card">
        <p class="section-label">All slots</p>
        <div id="admin-slots-list"><div class="loading">Loading…</div></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ---- Init ----
document.getElementById('hdr-name').textContent = CONFIG.CLINIC_NAME;
document.getElementById('hdr-sub').textContent = 'Book your appointment';
emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);

let slots = [];
let selectedSlotId = null;

// ---- Route: show admin if URL has #admin ----
function route() {
  if (window.location.hash === '#admin') {
    document.getElementById('view-book').style.display = 'none';
    document.getElementById('view-admin').style.display = 'block';
  } else {
    loadSlots();
  }
}

// ---- Toast ----
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ---- Fetch slots from Google Sheets ----
async function loadSlots(target='book') {
  try {
    const res = await fetch(CONFIG.SHEET_WEBAPP_URL + '?action=getSlots');
    const data = await res.json();
    slots = data.slots || [];
    if (target === 'book') renderBookingSlots();
    else renderAdminSlots();
  } catch(e) {
    document.getElementById('slots-grid').innerHTML = '<div class="no-slots">Could not load slots. Please try again.</div>';
  }
}

// ---- Render slots on booking page ----
function renderBookingSlots() {
  const grid = document.getElementById('slots-grid');
  const available = slots.filter(s => s.status === 'available');
  if (!available.length) {
    grid.innerHTML = '<div class="no-slots" style="grid-column:1/-1;">No slots available right now.<br>Please check back later.</div>';
    return;
  }
  grid.innerHTML = '';
  available.forEach(s => {
    const div = document.createElement('div');
    div.className = 'slot';
    div.dataset.id = s.id;
    const d = new Date(s.datetime);
    div.innerHTML = `<div class="slot-time">${fmt12(d)}</div><div class="slot-date">${fmtDate(d)}</div>`;
    div.onclick = () => selectSlot(s.id);
    grid.appendChild(div);
  });
}

function selectSlot(id) {
  selectedSlotId = id;
  document.querySelectorAll('#slots-grid .slot').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === String(id));
  });
}

// ---- Submit booking ----
async function submitBooking() {
  const name = document.getElementById('inp-name').value.trim();
  const mobile = document.getElementById('inp-mobile').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name) return toast('Please enter your name');
  if (!mobile || mobile.length < 10) return toast('Please enter a valid mobile number');
  if (!selectedSlotId) return toast('Please select a slot');

  const slot = slots.find(s => s.id === selectedSlotId);
  const btn = document.getElementById('btn-book');
  btn.disabled = true;
  btn.textContent = 'Booking…';

  try {
    const res = await fetch(CONFIG.SHEET_WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'bookSlot', slotId: selectedSlotId, patientName: name, patientMobile: mobile, patientEmail: email })
    });
    const result = await res.json();
    if (result.success) {
      const d = new Date(slot.datetime);
      const timeStr = fmt12(d) + ', ' + fmtDate(d);
      sendEmails(name, mobile, email, timeStr);
      document.getElementById('success-msg').textContent = `Your slot at ${timeStr} is confirmed. ${CONFIG.DOCTOR_NAME} will call you then.`;
      document.getElementById('success-box').classList.add('show');
      document.querySelector('.card').style.display = 'none';
      document.querySelectorAll('.card')[1].style.display = 'none';
    } else {
      toast('Slot just got booked. Please pick another.');
      btn.disabled = false;
      btn.textContent = 'Confirm appointment';
      loadSlots();
    }
  } catch(e) {
    toast('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Confirm appointment';
  }
}

// ---- EmailJS ----
function sendEmails(name, mobile, email, timeStr) {
  // Email to doctor
  emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_DOCTOR, {
    doctor_name: CONFIG.DOCTOR_NAME,
    patient_name: name,
    patient_mobile: mobile,
    patient_email: email || 'not provided',
    appointment_time: timeStr,
    to_email: CONFIG.DOCTOR_EMAIL
  });
  // Email to patient (only if they gave email)
  if (email) {
    emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_PATIENT, {
      patient_name: name,
      doctor_name: CONFIG.DOCTOR_NAME,
      clinic_name: CONFIG.CLINIC_NAME,
      appointment_time: timeStr,
      to_email: email
    });
  }
}

// ---- Admin: password gate ----
function checkPw() {
  const pw = document.getElementById('pw-inp').value;
  if (pw === CONFIG.ADMIN_PASSWORD) {
    document.getElementById('admin-pw-gate').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadSlots('admin');
  } else {
    toast('Wrong password');
  }
}

// ---- Admin: render slots ----
function renderAdminSlots() {
  const list = document.getElementById('admin-slots-list');
  if (!slots.length) { list.innerHTML = '<div class="no-slots">No slots yet.</div>'; return; }
  list.innerHTML = '';
  slots.forEach(s => {
    const d = new Date(s.datetime);
    const booked = s.status === 'booked';
    const row = document.createElement('div');
    row.className = 'admin-slot-row' + (booked ? ' admin-slot-booked' : '');
    row.innerHTML = `
      <div>
        <div style="font-size:14px;font-weight:600;">${fmt12(d)}, ${fmtDate(d)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;">${booked ? '🔒 Booked by ' + s.patientName + ' · ' + s.patientMobile : 'Available'}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span class="badge ${booked ? 'badge-booked' : 'badge-avail'}">${booked ? 'Booked' : 'Open'}</span>
        ${!booked ? `<button class="btn-danger" onclick="deleteSlot('${s.id}')">Delete</button>` : ''}
      </div>`;
    list.appendChild(row);
  });
}

// ---- Admin: add slot ----
async function addSlot() {
  const date = document.getElementById('admin-date').value;
  const time = document.getElementById('admin-time').value;
  if (!date || !time) return toast('Please select date and time');
  const datetime = date + 'T' + time + ':00';
  try {
    const res = await fetch(CONFIG.SHEET_WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addSlot', datetime })
    });
    const r = await res.json();
    if (r.success) { toast('Slot added!'); loadSlots('admin'); }
    else toast('Could not add slot');
  } catch(e) { toast('Network error'); }
}

// ---- Admin: delete slot ----
async function deleteSlot(id) {
  if (!confirm('Delete this slot?')) return;
  try {
    const res = await fetch(CONFIG.SHEET_WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteSlot', slotId: id })
    });
    const r = await res.json();
    if (r.success) { toast('Slot removed'); loadSlots('admin'); }
    else toast('Could not delete');
  } catch(e) { toast('Network error'); }
}

// ---- Date/time helpers ----
function fmt12(d) {
  let h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });
}

route();
</script>
</body>
</html>
